<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Audio Summary Plugin</title>
  <style>
    body { 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      width: 350px; 
      padding: 15px; 
      margin: 0; 
      background-color: #121212; 
      color: #e0e0e0;
      font-size: 13px; 
    }
    h2 { font-size: 16px; margin-top: 0; color: #81c784; }
    .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
    button { 
      flex: 1;
      padding: 8px; 
      cursor: pointer; 
      background-color: #2e7d32; 
      color: white; 
      border: none; 
      border-radius: 4px;
      font-weight: bold;
      font-size: 11px;
      transition: background-color 0.3s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      min-width: 100px;
    }
    button:hover { background-color: #388e3c; }
    button:disabled { background-color: #333; color: #777; cursor: not-allowed; }
    #fullSummarize { background-color: #1b5e20; }
    #fullSummarize:hover { background-color: #2e7d32; }
    #readAloud { background-color: #1565c0; width: 100%; flex: none; }
    #readAloud:hover { background-color: #1976d2; }
    #readAloud:disabled { background-color: #333; color: #777; }
    textarea { 
      width: 100%; 
      height: 250px; 
      padding: 10px; 
      box-sizing: border-box; 
      border: 1px solid #333; 
      border-radius: 4px;
      resize: none;
      font-size: 12px;
      line-height: 1.4;
      background-color: #1e1e1e;
      color: #e0e0e0;
    }
    .footer { font-size: 10px; margin-top: 10px; color: #888; text-align: center; display: flex; justify-content: space-between; align-items: center; }
    .error { color: #ff8a80; margin-bottom: 10px; font-size: 11px; display: none; padding: 8px; background: #2c1a1a; border-radius: 4px; border: 1px solid #663333; }
    a { color: #64b5f6; text-decoration: none; display: flex; align-items: center; gap: 4px; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h2>Audio Page Summarizer</h2>
  <div id="error" class="error"></div>
  <div class="btn-group">
    <button id="summarize">Short Summary</button>
    <button id="fullSummarize">Full Summary</button>
    <button id="readAloud" disabled><span>🔊</span> Read Aloud</button>
  </div>
  <textarea id="summary" placeholder="Summary will appear here..."></textarea>
  <div class="footer">
    <a href="options.html" target="_blank"><span>⚙️</span> Settings (API Key)</a>
    <span id="charCount"></span>
  </div>
  <script src="popup.js"></script>
</body>
</html>
